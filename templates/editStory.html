<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Story</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>
    <nav class="nav-bar">
        <a href="/" class="nav-title">ToTEM</a>
        <div class="nav-links">
            <a href="/">Register</a>
            <a href="/gallery">Gallery</a>
            <a href="/upload">Upload New Story</a>
        </div>
    </nav>
    <div class="centered-wrapper">
        <div class="container">
            <h2>Edit Story</h2>
            <form id="editForm" action="{{ url_for('edit_story', user_route=user_route) }}" method="post"
                enctype="multipart/form-data">
                <label for="image">Change Image (Optional):</label>
                <input type="file" id="image" name="image" accept="image/*">

                <label for="title">Title:</label>
                <input type="text" id="title" name="title" value="{{ user_data.title }}" required>

                <label for="description">Description:</label>
                <textarea id="description" name="description" required>{{ user_data.description }}</textarea>

                <div style="margin-top: 10px; margin-bottom: 20px;">
                    <input type="radio" id="mode_public" name="mode" value="public" {% if user_data.mode=='public'
                        %}checked{% endif %}>
                    <label for="mode_public">Public</label>

                    <input type="radio" id="mode_private" name="mode" value="private" {% if user_data.mode=='private'
                        %}checked{% endif %}>
                    <label for="mode_private">Private</label>
                </div>

                <input type="submit" value="Save Changes">
                <a href="{{ url_for('user_page', user_route=user_route) }}" class="button"
                    style="display: inline-block; text-align: center; text-decoration: none; background-color: #666; margin-left: 10px;">Cancel</a>
            </form>
        </div>
    </div>
</body>

</html>
